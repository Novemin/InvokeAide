# E2E ワークフロー(main ブランチへのマージ後)
# Playwright E2E + アクセシビリティ + Lighthouse CI
# Tさん テスト戦略 v0.2 §17.6 / §17.7 整合

name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build
        run: npm run build

      - name: Playwright E2E + a11y(Chromium のみ)
        run: npx playwright test --project=chromium

      - name: Playwright HTML レポート Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        run: npm run lighthouse
        continue-on-error: true
